name: rag-pipeline
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.4
  - pytorch-cuda=12.1        # adjust to match your CUDA version (e.g. 11.8, 12.4)
  - pip
  - pip:
      - pymupdf==1.27.2
      - numpy==1.26.4
      - faiss-gpu-cu12        # GPU-accelerated FAISS for CUDA 12.x (use faiss-gpu-cu11 for CUDA 11.x)
      - openai==2.30.0
      - anthropic==0.49.0
      - voyageai==0.3.7
      - Pillow
      - sentence-transformers==3.3.1
      - nltk==3.9.4
