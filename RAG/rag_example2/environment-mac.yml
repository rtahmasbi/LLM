name: rag-pipeline
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pytorch>=2.4
  - cpuonly                  # MPS (Apple Silicon) or CPU (Intel) — no CUDA on macOS
  - faiss-cpu=*=*openblas*   # force OpenBLAS build — MKL variant causes ImportError on macOS/Apple Silicon
  - scikit-learn             # must be in conda env — system sklearn causes numpy binary incompatibility
  - pip
  - pip:
      - pymupdf==1.27.2
      - numpy==1.26.4
      - openai==2.30.0
      - anthropic==0.49.0
      - voyageai==0.3.7
      - Pillow
      - sentence-transformers==3.3.1
      - nltk==3.9.4
